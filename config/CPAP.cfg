[tmc2209 manual_stepper flap_stepper]
cs_pin: PA10
diag1_pin: ^!PC0
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
driver_SGT: 1
run_current: 0.6
home_current: 1
sense_resistor: 0.075

[manual_stepper flap_stepper]
step_pin: PG15
dir_pin: !PB6
enable_pin: !PG14
microsteps: 64
rotation_distance: 1600
velocity: 32000
accel: 1280000
endstop_pin: tmc2209_flap_stepper: virtual_endstop

[gcode_macro _SET_FLAP_ENABLED]
variable_enabled: 0
gcode:
    {% set enabled=params.ENABLED|int %}
	{% set flap_enabled=printer["gcode_macro _SET_FLAP_ENABLED"].enabled|int %}
	{% if enabled!=flap_enabled %}
		SET_GCODE_VARIABLE MACRO=_SET_FLAP_ENABLED VARIABLE=enabled VALUE={enabled}
		{% if enabled==1 %}
			MANUAL_STEPPER STEPPER=flap_stepper ENABLE=1
			MANUAL_STEPPER STEPPER=flap_stepper MOVE=-255 STOP_ON_ENDSTOP=1 SPEED=30
			MANUAL_STEPPER STEPPER=flap_stepper SET_POSITION=0
		{% else %}
			MANUAL_STEPPER STEPPER=flap_stepper MOVE=0
			MANUAL_STEPPER STEPPER=flap_stepper ENABLE=0
		{% endif %}
	{% endif %}

[fan_generic cpap_fan]
pin:
max_power:
shutdown_speed:
cycle_time:
kick_start_time:
off_below:

[heater_generic cpap_heater]
gcode_id: cpap_heater
heater_pin: CPAP_HEATER
max_power:
sensor_type: MAX31856
sensor_pin: CPAP_THERMISTER               # The Chip Select (CS) pin for your MAX31856 board
spi_speed: 4000000            # Default SPI communication speed (4MHz)
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6

# TC TYPE DEFINITION (Crucial for correct scaling)
tc_type: J                    # Options: K, J, N, R, S, T, E, B (Default is K)
tc_use_50Hz_filter: False     # Set to True if you live in a 50Hz mains power region
tc_averaging_count: 1         # Number of samples averaged together (1, 3, 4, 8, 16)
smooth_time:
control: watermark
min_temp: 10
max_temp: 110
