[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% if params.P is defined %}
        {% if params.P|int == 3 %}
            {% if params.S is defined %}
                {% if params.S|int == 255 %}
                    {% set realspeed = 1 %}
                {% else %}
                    {% if params.S|int == 0 %}
                        {% set realspeed = 0 %}
                    {% else %}
                        {% set realspeed = params.S|float/255 %}
                    {% endif %}
                {% endif %}
            {% else %}
                {% set realspeed = 1 %}
            {% endif %}
            SET_FAN_SPEED FAN=exhaust_fan SPEED={realspeed}
		{% elif params.P|int == 1 %}
			_SET_FLAP_ENABLED ENABLED=1
			{% if params.S is defined %}
				MANUAL_STEPPER STEPPER=flap_stepper MOVE={params.S} SYNC=0
			{% else %}
				MANUAL_STEPPER STEPPER=flap_stepper MOVE=255 SYNC=0
			{% endif %}
		{% else %}
			M106.1 {rawparams}
        {% endif %}
    {% else %}
		_SET_FLAP_ENABLED ENABLED=1
        {% if params.S is defined %}
          MANUAL_STEPPER STEPPER=flap_stepper MOVE={params.S} SYNC=0
        {% else %}
          MANUAL_STEPPER STEPPER=flap_stepper MOVE=255 SYNC=0
        {% endif %}
    {% endif %}
